name: Daily digest

# Self-contained daily pipeline. Runs entirely on GitHub's servers — no local
# machine, no Cowork sandbox. Does: fetch -> summarize -> commit -> build ->
# deploy Pages -> push Feishu. Self-deploys because a GITHUB_TOKEN push does
# NOT trigger deploy.yml (GitHub anti-loop rule), so we cannot rely on it.

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/daily-digest.yml"
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai. GitHub cron can lag 5-15 min.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      push_empty_day:
        description: "Send a heartbeat card even if no new papers"
        required: false
        default: "0"

permissions:
  contents: write   # commit + push generated markdown
  pages: write      # deploy Pages
  id-token: write   # deploy-pages OIDC

concurrency:
  group: daily-digest
  cancel-in-progress: false

env:
  DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
  DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
  DEEPSEEK_MODEL:    ${{ vars.DEEPSEEK_MODEL }}
  FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
  FEISHU_SECRET:     ${{ secrets.FEISHU_SECRET }}
  FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
  FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
  FEISHU_CHAT_ID:    ${{ secrets.FEISHU_CHAT_ID }}
  FEISHU_RECEIVE_ID_TYPE: ${{ vars.FEISHU_RECEIVE_ID_TYPE }}
  SITE_URL:          ${{ vars.SITE_URL }}
  BASE_PATH:         ${{ vars.BASE_PATH }}
  MAX_PAPERS_PER_DAY: ${{ vars.MAX_PAPERS_PER_DAY }}
  MIN_SCORE_KEEP:     ${{ vars.MIN_SCORE_KEEP }}
  MIN_SCORE_DEEP:     ${{ vars.MIN_SCORE_DEEP }}
  MIN_PAPERS_PER_DAY: ${{ vars.MIN_PAPERS_PER_DAY }}
  PDF_TEXT_MAX_CHARS: ${{ vars.PDF_TEXT_MAX_CHARS }}
  # built-in token (no setup needed) — for GitHub repo search / README
  GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
  PUSH_EMPTY_DAY:     ${{ github.event.inputs.push_empty_day || '0' }}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: |
          pip install -r requirements.txt
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      # ---- agent pipeline ----
      - name: Fetch papers
        run: python scripts/fetch.py
      - name: Process papers
        run: python scripts/process.py
      - name: Write paper markdown
        run: python scripts/write_md.py
      - name: Fetch news
        run: python scripts/fetch_news.py
      - name: Process news
        run: python scripts/process_news.py
      - name: Write news markdown
        run: python scripts/write_news_md.py
      # repos: best-effort — a GitHub search rate-limit must not fail the run
      - name: Fetch hot repos
        continue-on-error: true
        run: python scripts/fetch_repos.py
      - name: Process repos
        continue-on-error: true
        run: python scripts/process_repos.py
      - name: Write repos markdown
        continue-on-error: true
        run: python scripts/write_repos_md.py

      - name: Commit generated content
        run: |
          set -e
          git config user.name  "papers-agent[bot]"
          git config user.email "papers-agent@users.noreply.github.com"
          git add src/content/papers/ src/content/news/ src/content/archive_papers/ src/content/repos/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            N=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "chore(content): daily update $DATE ($N files)"
            git push
          fi

      # ---- build + deploy Pages (self-contained, no cross-workflow trigger) ----
      - name: Build with Astro
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Non-fatal: Feishu misconfig (wrong chat_id / bot not in group) must not
      # red-flag content generation or Pages deployment.
      - name: Push Feishu digest
        continue-on-error: true
        run: python scripts/push_feishu.py

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
